        - blockquote [ref=e88]:
          - text: “
          - paragraph [ref=e89]: Il y a plusieurs façons de fuir. Certains utilisent les drogues dites «psychotogènes». D’autres la psychose. D’autres le suicide. D’autres la navigation en solitaire. Il y a peut-être une autre façon encore fuir dans un monde qui n’est pas de ce monde, le monde de l’imaginaire. Dans ce monde on risque peu d’être poursuivi. On peut s’y tailler un vaste territoire gratifiant, que certains diront narcissique. Peu importe, car dans le monde où règne le principe de réalité, la soumission et la révolte, la dominance et le conservatisme auront perdu pour le fuyard leur caractère anxiogène et ne seront plus considérés que comme un jeu auquel on peut, sans crainte, participer de façon à se faire accepter par les autres comme « normal ».
          - blockquote [ref=e90]:
            - paragraph [ref=e91]: Henri Laborit [Eloge de la fuite]
